name: CI / Deploy

on:
  push:
    branches: [main, test]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main, test]
    paths-ignore:
      - '**.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  # ── Job 1: Build & Test ─────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ vars.JAVA_VERSION || '21' }}
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn verify -B --no-transfer-progress -T 1C

      - name: Upload JAR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # ── Job 2: Build image, push to ECR, trigger CodeDeploy ─────────
  deploy:
    name: Deploy
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build, push, and upload artifacts
        run: |
          ECR_URI=$(aws ssm get-parameter --name /bem15/prod/ecr/image-uri --query Parameter.Value --output text)
          ARTIFACTS_BUCKET=$(aws ssm get-parameter --name /bem15/prod/s3/artifacts-bucket --query Parameter.Value --output text)
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          sed "s|<IMAGE1_NAME>|${ECR_URI}|g; s|ACCOUNT_ID|${ACCOUNT_ID}|g" \
            codedeploy/taskdef.json > /tmp/taskdef.json
          cp codedeploy/appspec.yaml /tmp/appspec.yaml
          (cd /tmp && zip -q deploy-artifacts.zip taskdef.json appspec.yaml)
          aws s3 cp /tmp/deploy-artifacts.zip "s3://${ARTIFACTS_BUCKET}/prod/deploy-artifacts.zip"

          docker buildx build --push \
            --tag "${ECR_URI}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .

          echo "::notice title=Deployed::${ECR_URI}"
