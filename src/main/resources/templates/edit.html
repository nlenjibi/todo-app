<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Edit Task — Todo App</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/tasks}">← Todo App</a>
  </div>
</nav>

<div class="container mt-4" style="max-width: 520px;">
  <div class="card shadow-sm">
    <div class="card-header bg-white fw-semibold">Edit Task</div>
    <div class="card-body">
      <form th:action="@{/tasks/{id}(id=${id})}" method="post" th:object="${task}">
        <div class="mb-3">
          <label class="form-label fw-medium">Title</label>
          <input type="text" class="form-control" th:field="*{title}" required maxlength="255"/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-medium">Description</label>
          <textarea class="form-control" th:field="*{description}" rows="3" maxlength="2000"></textarea>
        </div>
        <div class="mb-4 form-check">
          <input type="checkbox" class="form-check-input" th:field="*{completed}" id="completed"/>
          <label class="form-check-label" for="completed">Mark as completed</label>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a th:href="@{/tasks}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
