<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Task - TaskFlow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="container" style="max-width: 420px; padding-top: 60px;">

  <div class="modal-content">
    <div class="modal-header">Edit Task</div>

    <form th:action="@{/tasks/{id}(id=${id})}" method="post" th:object="${task}">
      <div class="field">
        <label for="title">Title</label>
        <input type="text" id="title" class="modal-input" th:field="*{title}" required maxlength="255"/>
      </div>
      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" class="modal-input" th:field="*{description}" rows="3" maxlength="2000"></textarea>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" th:field="*{completed}" id="completed"/>
        <label for="completed">Mark as completed</label>
      </div>
      <div class="modal-actions">
        <a th:href="@{/tasks}" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-save">Save Changes</button>
      </div>
    </form>
  </div>

</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
