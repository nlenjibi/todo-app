<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Todo App</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
  <div class="container">
    <span class="navbar-brand fw-bold">Todo App</span>
    <span class="navbar-text text-white-50" th:text="${tasks.size()} + ' task(s)'"></span>
  </div>
</nav>

<div class="container mt-4" style="max-width: 720px;">

  <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${message}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Create Task -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-white fw-semibold">New Task</div>
    <div class="card-body">
      <form th:action="@{/tasks}" method="post" th:object="${newTask}">
        <div class="mb-3">
          <input type="text" class="form-control" placeholder="Task title" th:field="*{title}" required maxlength="255"/>
        </div>
        <div class="mb-3">
          <textarea class="form-control" placeholder="Description (optional)" th:field="*{description}" rows="2" maxlength="2000"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Add Task</button>
      </form>
    </div>
  </div>

  <!-- Task List -->
  <div th:if="${tasks.empty}" class="text-center text-muted py-5">
    <p class="mb-0">No tasks yet — add one above.</p>
  </div>

  <div th:each="task : ${tasks}" class="card shadow-sm mb-2">
    <div class="card-body d-flex justify-content-between align-items-start gap-3">
      <div class="flex-grow-1">
        <p class="mb-0 fw-medium"
           th:text="${task.title}"
           th:classappend="${task.completed} ? ' text-decoration-line-through text-muted' : ''"></p>
        <small th:if="${task.description != null and !task.description.isEmpty()}"
               class="text-muted" th:text="${task.description}"></small>
      </div>
      <div class="d-flex gap-2 flex-shrink-0">
        <!-- Toggle complete -->
        <form th:action="@{/tasks/{id}(id=${task.id})}" method="post">
          <input type="hidden" name="title" th:value="${task.title}"/>
          <input type="hidden" name="description" th:value="${task.description}"/>
          <input type="hidden" name="completed" th:value="${!task.completed}"/>
          <button type="submit" class="btn btn-sm"
                  th:classappend="${task.completed} ? 'btn-outline-warning' : 'btn-success'"
                  th:text="${task.completed} ? 'Undo' : 'Done'">
          </button>
        </form>
        <a th:href="@{/tasks/{id}/edit(id=${task.id})}" class="btn btn-sm btn-outline-secondary">Edit</a>
        <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post"
              onsubmit="return confirm('Delete this task?')">
          <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
        </form>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
