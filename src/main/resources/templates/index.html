<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow - To-Do Application</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="container">

  <header>
    <h1>TaskFlow</h1>
    <p class="tagline">MANAGE YOUR TASKS EFFICIENTLY</p>
  </header>

  <div th:if="${message}" class="alert alert-success">
    <span th:text="${message}"></span>
    <button type="button" class="btn-close" onclick="this.parentElement.remove()">✕</button>
  </div>
  <div th:if="${error}" class="alert alert-danger">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" onclick="this.parentElement.remove()">✕</button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <span class="stat-number" th:text="${tasks.size()}">0</span>
      <span class="stat-label">Total Tasks</span>
    </div>
    <div class="stat-card">
      <span class="stat-number" th:text="${tasks.?[!completed].size()}">0</span>
      <span class="stat-label">Active</span>
    </div>
    <div class="stat-card">
      <span class="stat-number" th:text="${tasks.?[completed].size()}">0</span>
      <span class="stat-label">Completed</span>
    </div>
  </div>

  <form th:action="@{/tasks}" method="post" th:object="${newTask}">
    <div class="input-section">
      <div class="input-row">
        <input type="text" id="taskInput" placeholder="Add a new task..." autocomplete="off"
               th:field="*{title}" required maxlength="255"/>
        <button type="submit" class="btn-add">Add Task</button>
      </div>
      <textarea id="taskDescription" placeholder="Description (optional)" rows="1"
                th:field="*{description}" maxlength="2000"></textarea>
    </div>
  </form>

  <div class="filters">
    <button type="button" class="filter-btn active" data-filter="all">All</button>
    <button type="button" class="filter-btn" data-filter="active">Active</button>
    <button type="button" class="filter-btn" data-filter="completed">Completed</button>
  </div>

  <div class="tasks-container" id="tasksContainer">

    <div th:if="${tasks.empty}" class="empty-state">
      <div class="empty-state-icon">📝</div>
      <div class="empty-state-text">No tasks yet. Add one to get started!</div>
    </div>

    <div th:each="task : ${tasks}" class="task-item" th:classappend="${task.completed} ? ' completed' : ''"
         th:data-completed="${task.completed}">

      <form th:action="@{/tasks/{id}(id=${task.id})}" method="post" style="display: contents;">
        <input type="hidden" name="title" th:value="${task.title}"/>
        <input type="hidden" name="description" th:value="${task.description}"/>
        <input type="hidden" name="completed" th:value="${!task.completed}"/>
        <input type="checkbox" class="task-checkbox" aria-label="Mark task as completed"
               th:checked="${task.completed}" onchange="this.form.requestSubmit()"/>
      </form>

      <div class="task-content">
        <div class="task-text" th:text="${task.title}"></div>
        <div th:if="${task.description != null and !task.description.isEmpty()}"
             class="task-desc" th:text="${task.description}"></div>
      </div>

      <div class="task-actions">
        <a th:href="@{/tasks/{id}/edit(id=${task.id})}" class="btn-edit">Edit</a>
        <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post"
              onsubmit="return confirm('Delete this task?')">
          <button type="submit" class="btn-delete">Delete</button>
        </form>
      </div>

    </div>

  </div>

</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
